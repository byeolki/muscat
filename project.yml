name: Podo
options:
  bundleIdPrefix: com.podo
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  PodoKit:
    path: Packages/PodoKit

targets:
  Podo-iOS:
    type: application
    platform: iOS
    sources:
      - path: Podo
    dependencies:
      - package: PodoKit
        product: PodoKit
      - target: PodoWidgetsExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podo.client.ios
        PRODUCT_NAME: Podo
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Generated/Podo-iOS-Info.plist
      properties:
        CFBundleDisplayName: Podo
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: >-
          자체 호스팅 중인 Podo 서버(로컬 네트워크의 자체 서버 포함)에 연결하기 위해 네트워크 접근이 필요합니다.
        NSSupportsLiveActivities: true

  PodoWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PodoWidgets
    dependencies:
      - package: PodoKit
        product: PodoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podo.client.ios.widgets
        PRODUCT_NAME: PodoWidgets
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: true
    info:
      path: Generated/PodoWidgets-Info.plist
      properties:
        CFBundleDisplayName: Podo Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  Podo-macOS:
    type: application
    platform: macOS
    sources:
      - path: Podo
    dependencies:
      - package: PodoKit
        product: PodoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.podo.client.mac
        PRODUCT_NAME: Podo
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Entitlements/Podo-macOS.entitlements
    info:
      path: Generated/Podo-macOS-Info.plist
      properties:
        CFBundleDisplayName: Podo
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

schemes:
  Podo-iOS:
    build:
      targets:
        Podo-iOS: all
        PodoWidgetsExtension: all
    run:
      config: Debug
    test:
      config: Debug
  Podo-macOS:
    build:
      targets:
        Podo-macOS: all
    run:
      config: Debug
    test:
      config: Debug
