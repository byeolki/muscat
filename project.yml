name: Muscat
options:
  bundleIdPrefix: com.muscat
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: GFLR4AF99Z
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development

configs:
  Debug: debug
  Release: release

packages:
  MuscatKit:
    path: Packages/MuscatKit

targets:
  Muscat-iOS:
    type: application
    platform: iOS
    sources:
      - path: Muscat
    dependencies:
      - package: MuscatKit
        product: MuscatKit
      - target: MuscatWidgetsExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.muscat.client.ios
        PRODUCT_NAME: Muscat
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Generated/Muscat-iOS-Info.plist
      properties:
        CFBundleDisplayName: Muscat
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: >-
          Network access is needed to connect to your self-hosted Podo server,
          including servers on your local network.
        NSSupportsLiveActivities: true

  MuscatWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MuscatWidgets
    dependencies:
      - package: MuscatKit
        product: MuscatKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.muscat.client.ios.widgets
        PRODUCT_NAME: MuscatWidgets
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: true
    info:
      path: Generated/MuscatWidgets-Info.plist
      properties:
        CFBundleDisplayName: Muscat Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  Muscat-macOS:
    type: application
    platform: macOS
    sources:
      - path: Muscat
    dependencies:
      - package: MuscatKit
        product: MuscatKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.muscat.client.mac
        PRODUCT_NAME: Muscat
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Entitlements/Muscat-macOS.entitlements
    info:
      path: Generated/Muscat-macOS-Info.plist
      properties:
        CFBundleDisplayName: Muscat
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

schemes:
  Muscat-iOS:
    build:
      targets:
        Muscat-iOS: all
        MuscatWidgetsExtension: all
    run:
      config: Debug
    test:
      config: Debug
  Muscat-macOS:
    build:
      targets:
        Muscat-macOS: all
    run:
      config: Debug
    test:
      config: Debug
